# DigitalOcean App Platform example spec for FamilyTrack.
# Copy these settings into DigitalOcean App Platform, or adapt this file after
# replacing the GitHub repo placeholder.
#
# Do not paste real secrets into this file before committing it.

name: familytrack
region: lon
features:
  - buildpack-stack=ubuntu-22

ingress:
  rules:
    - component:
        name: api
      match:
        path:
          prefix: /api
    - component:
        name: web
      match:
        path:
          prefix: /

services:
  - name: api
    environment_slug: node-js
    source_dir: backend
    github:
      repo: YOUR_GITHUB_USER/YOUR_REPO_NAME
      branch: main
      deploy_on_push: true
    build_command: npm ci
    run_command: npm start
    http_port: 4000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /api/health/db
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
        type: GENERAL
      - key: DATABASE_URL
        value: REPLACE_IN_DIGITALOCEAN
        scope: RUN_TIME
        type: SECRET
      - key: SESSION_SECRET
        value: REPLACE_IN_DIGITALOCEAN
        scope: RUN_TIME
        type: SECRET
      - key: FRONTEND_URL
        value: REPLACE_WITH_DIGITALOCEAN_APP_URL
        scope: RUN_TIME
        type: GENERAL
      - key: STRIPE_SECRET_KEY
        value: REPLACE_IN_DIGITALOCEAN
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        value: REPLACE_IN_DIGITALOCEAN
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_ID
        value: REPLACE_IN_DIGITALOCEAN
        scope: RUN_TIME
        type: GENERAL

static_sites:
  - name: web
    environment_slug: node-js
    source_dir: /
    github:
      repo: YOUR_GITHUB_USER/YOUR_REPO_NAME
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    output_dir: dist
    index_document: index.html
    catchall_document: index.html
    envs:
      - key: VITE_API_BASE_URL
        value: /api
        scope: BUILD_TIME
        type: GENERAL
      - key: VITE_DO_SPACES_ENDPOINT
        value: https://REGION.digitaloceanspaces.com
        scope: BUILD_TIME
        type: GENERAL
      - key: VITE_DO_SPACES_BUCKET
        value: REPLACE_WITH_SPACES_BUCKET
        scope: BUILD_TIME
        type: GENERAL
      - key: VITE_DO_SPACES_REGION
        value: REPLACE_WITH_SPACES_REGION
        scope: BUILD_TIME
        type: GENERAL
      - key: VITE_DO_SPACES_PUBLIC_URL
        value: https://REPLACE_WITH_SPACES_BUCKET.REGION.digitaloceanspaces.com
        scope: BUILD_TIME
        type: GENERAL
